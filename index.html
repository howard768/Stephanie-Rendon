      <h1>Stephanie Rendon</h1>
      <h2>Strategic Communications & Media Relations</h2>
      <p><strong>Stephanie Rendon is a bilingual (English/Spanish) strategic communications consultant based in New York City, specializing in crisis communications, media relations, brand strategy, and community engagement for nonprofits, NGOs, and education organizations. She is available for freelance consulting.</strong></p>
      <p>Stephanie Rendon is a bilingual communications leader with 14+ years of experience shaping narratives for mission-driven organizations. Currently Head of Marketing & Communications at School in the Square, a PreK-12 public charter school network in Washington Heights and Inwood serving 800+ students through a dual-language English/Spanish model.</p>
      <p>Previously led brand strategy, media relations, and editorial at FIU's Robert Stempel College of Public Health & Social Work, and shaped national communications for the American Red Cross and SOS Children's Villages.</p>
      <p>Featured in The New York Times, NBC News, CBS News, The Today Show, CNN, The Washington Post, The Associated Press, and Bloomberg.</p>
      <p>Specializes in brand strategy, community engagement, crisis communications, and turning complex stories into coverage that moves people to act.</p>
      <h3>Career Highlights</h3>
      <ul>
        <li>Leads marketing, communications, and community engagement for School in the Square, a PreK-12 charter network in Washington Heights and Inwood</li>
        <li>Ran media strategy at the American Red Cross and supported national crisis and disaster response communications across the organization</li>
        <li>Directed communications for SOS Children's Villages, landing coverage in NBC, CNN, Reuters, and The Associated Press</li>
        <li>Managed FIU Stempel College's marketing across brand, editorial, media, social, and advertising</li>
      </ul>
      <p><a href="https://www.linkedin.com/in/rendonstephanie/">Connect on LinkedIn</a></p>
